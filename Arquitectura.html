<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arquitectura — Horario Personal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060608;--surface:#0e0e14;--surface2:#16161f;
  --border:#ffffff0f;--text:#e8e8f0;--muted:#55556a;
  --cyan:#00e5ff;--purple:#a855f7;--green:#22c55e;--orange:#f97316;--blue:#3b82f6;
}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 40%,transparent 100%);z-index:0;
}
header{position:relative;z-index:1;text-align:center;padding:3rem 1rem 1.5rem;}
.tag{display:inline-block;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,229,255,.2);border-radius:4px;padding:3px 12px;margin-bottom:1rem;}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{font-size:.75rem;color:var(--muted);margin-top:.5rem;letter-spacing:.08em;}
.hint{text-align:center;font-size:.68rem;color:var(--muted);letter-spacing:.1em;position:relative;z-index:1;margin-bottom:.5rem;animation:ph 2s ease infinite;}
@keyframes ph{0%,100%{opacity:.4}50%{opacity:1}}
.diagram{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:0 1rem 2rem;}
.arch-svg{width:100%;height:auto;display:block;}
.node{cursor:pointer;transition:filter .2s;}
.node:hover{filter:brightness(1.4) drop-shadow(0 0 14px currentColor);}
.nl{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;pointer-events:none;}
.ns{font-family:'JetBrains Mono',monospace;font-size:9px;pointer-events:none;}
.np{font-family:'JetBrains Mono',monospace;font-size:8px;pointer-events:none;}
.arrow{stroke-width:1.5;fill:none;stroke-dasharray:6,4;animation:da 18s linear infinite;}
@keyframes da{to{stroke-dashoffset:-300;}}
.legend{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin:.5rem auto 2rem;max-width:980px;padding:0 1rem;position:relative;z-index:1;}
.li{display:flex;align-items:center;gap:.4rem;font-size:.65rem;letter-spacing:.08em;color:var(--muted);}
.ld{width:8px;height:8px;border-radius:50%;}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:540px;width:100%;padding:2rem;position:relative;max-height:88vh;overflow-y:auto;transform:translateY(24px) scale(.97);transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:0 32px 80px rgba(0,0,0,.8);}
.overlay.open .modal{transform:none;}
.mbar{width:36px;height:3px;border-radius:2px;margin-bottom:1.1rem;}
.msvc{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;margin-bottom:.35rem;}
.mtitle{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;margin-bottom:.9rem;line-height:1.2;}
.mdesc{font-size:.78rem;line-height:1.75;color:rgba(232,232,240,.72);margin-bottom:1.3rem;}
.props{display:flex;flex-direction:column;gap:.45rem;}
.prop{display:flex;align-items:flex-start;gap:.7rem;background:var(--surface2);border-radius:8px;padding:.6rem .85rem;border:1px solid var(--border);}
.pk{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;width:92px;margin-top:.1rem;}
.pv{font-size:.74rem;color:rgba(232,232,240,.68);line-height:1.5;}
.cbtn{position:absolute;top:1rem;right:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;color:var(--muted);transition:all .18s;}
.cbtn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
</style>
</head>
<body>
<header>
  <div class="tag">Diagrama de Arquitectura</div>
  <h1>Horario Personal</h1>
  <p class="sub">Stack serverless en AWS · São Paulo (sa-east-1)</p>
</header>
<p class="hint">↓ &nbsp;haz click en cada bloque para ver detalles&nbsp; ↓</p>

<div class="diagram">
<svg class="arch-svg" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="fc"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="fp"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="fo"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="fg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <marker id="ac" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00e5ff" opacity=".7"/></marker>
  <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#a855f7" opacity=".7"/></marker>
  <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f97316" opacity=".7"/></marker>

</defs>

<!-- AWS Cloud panel -->
<rect x="290" y="28" width="592" height="494" rx="14" fill="rgba(59,130,246,.04)" stroke="rgba(59,130,246,.2)" stroke-width="1" stroke-dasharray="7,5"/>
<text x="308" y="50" font-family="JetBrains Mono" font-size="10" fill="#3b82f6" opacity=".65" letter-spacing="2">AWS CLOUD — sa-east-1</text>

<!-- Auth sub-panel -->
<rect x="306" y="60" width="252" height="188" rx="10" fill="rgba(168,85,247,.05)" stroke="rgba(168,85,247,.16)" stroke-width="1" stroke-dasharray="4,3"/>
<text x="320" y="78" font-family="JetBrains Mono" font-size="9" fill="#a855f7" opacity=".6" letter-spacing="1.5">AUTENTICACIÓN</text>

<rect x="306" y="268" width="252" height="230" rx="10" fill="rgba(249,115,22,.05)" stroke="rgba(249,115,22,.16)" stroke-width="1" stroke-dasharray="4,3"/>
<text x="320" y="286" font-family="JetBrains Mono" font-size="9" fill="#f97316" opacity=".6" letter-spacing="1.5">COMPUTE</text>

<rect x="578" y="268" width="282" height="230" rx="10" fill="rgba(34,197,94,.05)" stroke="rgba(34,197,94,.16)" stroke-width="1" stroke-dasharray="4,3"/>
<text x="592" y="286" font-family="JetBrains Mono" font-size="9" fill="#22c55e" opacity=".6" letter-spacing="1.5">STORAGE</text>

<!-- Arrows -->
<path class="arrow" d="M92 200 L150 200" stroke="#00e5ff" opacity=".6" marker-end="url(#ac)"/>
<text x="100" y="193" font-family="JetBrains Mono" font-size="8" fill="#00e5ff" opacity=".5">HTTPS</text>
<path class="arrow" d="M240 175 Q272 150 306 140" stroke="#a855f7" opacity=".5" marker-end="url(#ap)"/>
<text x="246" y="151" font-family="JetBrains Mono" font-size="8" fill="#a855f7" opacity=".5">login</text>
<path d="M306 162 Q272 182 240 196" stroke="#a855f7" opacity=".25" stroke-width="1.5" stroke-dasharray="3,5" fill="none" marker-end="url(#ap)"/>
<text x="248" y="181" font-family="JetBrains Mono" font-size="8" fill="#a855f7" opacity=".4">JWT</text>
<path class="arrow" d="M240 216 Q272 216 306 345" stroke="#f97316" opacity=".5" marker-end="url(#ao)"/>
<text x="244" y="244" font-family="JetBrains Mono" font-size="8" fill="#f97316" opacity=".5">API call</text>
<path class="arrow" d="M558 375 L578 375" stroke="#22c55e" opacity=".6" marker-end="url(#ag)"/>
<text x="553" y="368" font-family="JetBrains Mono" font-size="8" fill="#22c55e" opacity=".5">CRUD</text>
<path d="M432 415 Q510 450 578 415" stroke="#55556a" opacity=".3" stroke-width="1" stroke-dasharray="3,4" fill="none"/>
<text x="482" y="446" font-family="JetBrains Mono" font-size="8" fill="#55556a" opacity=".5">IAM Role</text>

<!-- JWT badge -->
<rect x="446" y="106" width="96" height="34" rx="6" fill="rgba(168,85,247,.07)" stroke="rgba(168,85,247,.28)" stroke-width="1" stroke-dasharray="3,3"/>
<text x="494" y="120" font-family="JetBrains Mono" font-size="9" fill="#a855f7" text-anchor="middle">JWT Token</text>
<text x="494" y="133" font-family="JetBrains Mono" font-size="8" fill="#a855f7" text-anchor="middle" opacity=".55">TTL: 5 min</text>

<!-- NODE: USER -->
<g class="node" onclick="om('user')" filter="url(#fc)">
  <rect x="18" y="158" width="74" height="84" rx="12" fill="rgba(0,229,255,.09)" stroke="#00e5ff" stroke-width="1.5"/>
  <circle cx="55" cy="182" r="10" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
  <path d="M35 220 Q35 203 55 203 Q75 203 75 220" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
  <text class="nl" x="55" y="236" text-anchor="middle" fill="#00e5ff">Usuario</text>
</g>

<!-- NODE: GITHUB PAGES -->
<g class="node" onclick="om('github')" filter="url(#fc)">
  <rect x="150" y="146" width="90" height="104" rx="12" fill="rgba(0,229,255,.09)" stroke="#00e5ff" stroke-width="1.5"/>
  <circle cx="195" cy="172" r="14" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
  <path d="M187 186 Q187 200 195 200 Q203 200 203 186" fill="none" stroke="#00e5ff" stroke-width="1.2"/>
  <text class="nl" x="195" y="225" text-anchor="middle" fill="#00e5ff">GitHub</text>
  <text class="ns" x="195" y="239" text-anchor="middle" fill="#00e5ff" opacity=".65">Pages</text>
</g>

<!-- NODE: COGNITO -->
<g class="node" onclick="om('cognito')" filter="url(#fp)">
  <rect x="322" y="84" width="220" height="150" rx="12" fill="rgba(168,85,247,.1)" stroke="#a855f7" stroke-width="1.5"/>
  <path d="M432 102 L457 112 L457 136 Q457 155 432 165 Q407 155 407 136 L407 112 Z" fill="rgba(168,85,247,.18)" stroke="#a855f7" stroke-width="1.5"/>
  <path d="M423 140 L430 147 L443 132" fill="none" stroke="#a855f7" stroke-width="2"/>
  <text class="nl" x="432" y="185" text-anchor="middle" fill="#a855f7">Cognito User Pool</text>
  <text class="ns" x="432" y="199" text-anchor="middle" fill="#a855f7" opacity=".65">sa-east-1_eTpl9ADWH</text>
  <rect x="336" y="208" width="192" height="16" rx="3" fill="rgba(168,85,247,.1)"/>
  <text class="np" x="340" y="219" fill="#a855f7" opacity=".7">ID Token: 5min  ·  Refresh: 60min</text>
</g>

<!-- NODE: LAMBDA -->
<g class="node" onclick="om('lambda')" filter="url(#fo)">
  <rect x="322" y="295" width="236" height="180" rx="12" fill="rgba(249,115,22,.09)" stroke="#f97316" stroke-width="1.5"/>
  <text x="365" y="358" font-family="JetBrains Mono" font-size="44" font-weight="700" fill="rgba(249,115,22,.18)">λ</text>
  <text class="nl" x="440" y="318" text-anchor="middle" fill="#f97316">Lambda Function</text>
  <text class="ns" x="440" y="332" text-anchor="middle" fill="#f97316" opacity=".65">horario-personal-api</text>
  <rect x="336" y="342" width="208" height="16" rx="3" fill="rgba(249,115,22,.1)"/>
  <text class="np" x="340" y="353" fill="#f97316" opacity=".7">Python 3.12  ·  arm64  ·  128 MB</text>
  <rect x="336" y="362" width="208" height="16" rx="3" fill="rgba(249,115,22,.1)"/>
  <text class="np" x="340" y="373" fill="#f97316" opacity=".7">Auth: Bearer JWT (valida sub)</text>
  <rect x="336" y="382" width="208" height="16" rx="3" fill="rgba(249,115,22,.1)"/>
  <text class="np" x="340" y="393" fill="#f97316" opacity=".7">Rutas: GET · PUT · DELETE</text>
  <rect x="336" y="402" width="208" height="16" rx="3" fill="rgba(249,115,22,.1)"/>
  <text class="np" x="340" y="413" fill="#f97316" opacity=".7">Function URL · Sin API Gateway</text>
  <rect x="336" y="422" width="208" height="16" rx="3" fill="rgba(249,115,22,.1)"/>
  <text class="np" x="340" y="433" fill="#f97316" opacity=".7">CORS: *  ·  Timeout: 10s</text>
  <rect x="336" y="442" width="208" height="16" rx="3" fill="rgba(249,115,22,.1)"/>
  <text class="np" x="340" y="453" fill="#f97316" opacity=".7">Costo: ~$0 uso personal</text>
</g>

<!-- NODE: DYNAMODB -->
<g class="node" onclick="om('dynamo')" filter="url(#fg)">
  <rect x="594" y="295" width="254" height="180" rx="12" fill="rgba(34,197,94,.09)" stroke="#22c55e" stroke-width="1.5"/>
  <ellipse cx="674" cy="326" rx="24" ry="8" fill="rgba(34,197,94,.15)" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="650" y1="326" x2="650" y2="348" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="698" y1="326" x2="698" y2="348" stroke="#22c55e" stroke-width="1.5"/>
  <ellipse cx="674" cy="348" rx="24" ry="8" fill="rgba(34,197,94,.15)" stroke="#22c55e" stroke-width="1.5"/>
  <text class="nl" x="728" y="320" fill="#22c55e">DynamoDB</text>
  <text class="ns" x="728" y="335" fill="#22c55e" opacity=".65">horario-personal-table</text>
  <rect x="608" y="362" width="226" height="16" rx="3" fill="rgba(34,197,94,.1)"/>
  <text class="np" x="612" y="373" fill="#22c55e" opacity=".7">PK: userId — sub de Cognito</text>
  <rect x="608" y="382" width="226" height="16" rx="3" fill="rgba(34,197,94,.1)"/>
  <text class="np" x="612" y="393" fill="#22c55e" opacity=".7">SK: day — lunes…domingo</text>
  <rect x="608" y="402" width="226" height="16" rx="3" fill="rgba(34,197,94,.1)"/>
  <text class="np" x="612" y="413" fill="#22c55e" opacity=".7">Attr: slots (Map) · updatedAt</text>
  <rect x="608" y="422" width="226" height="16" rx="3" fill="rgba(34,197,94,.1)"/>
  <text class="np" x="612" y="433" fill="#22c55e" opacity=".7">Billing: PAY_PER_REQUEST</text>
  <rect x="608" y="442" width="226" height="16" rx="3" fill="rgba(34,197,94,.1)"/>
  <text class="np" x="612" y="453" fill="#22c55e" opacity=".7">Costo: ~$0 uso personal</text>
</g>

</svg>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#00e5ff"></div>Frontend / Usuario</div>
  <div class="li"><div class="ld" style="background:#a855f7"></div>Autenticación</div>
  <div class="li"><div class="ld" style="background:#f97316"></div>Compute</div>
  <div class="li"><div class="ld" style="background:#22c55e"></div>Base de datos</div>
  <div class="li"><div class="ld" style="background:#3b82f6"></div>AWS Cloud</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="cm(event)">
  <div class="modal" id="modal">
    <button class="cbtn" onclick="cd()">✕</button>
    <div class="mbar" id="mbar"></div>
    <div class="msvc" id="msvc"></div>
    <div class="mtitle" id="mtitle"></div>
    <div class="mdesc" id="mdesc"></div>
    <div class="props" id="mprops"></div>
  </div>
</div>

<script>
const D = {
  user:{
    c:"#00e5ff",s:"Cliente",t:"Usuario Final",
    d:"Persona que accede desde navegador en desktop o móvil. La sesión expira a los 5 minutos si el token caduca y el usuario vuelve a la pestaña. También existe un detector de inactividad de 10 minutos en el frontend que cierra sesión automáticamente.",
    p:[
      {k:"Acceso",v:"Navegador web — desktop y móvil (PWA instalable)"},
      {k:"Autenticación",v:"Email + contraseña via Cognito SRP"},
      {k:"Sesión",v:"JWT ID Token válido por 5 minutos"},
      {k:"Refresh",v:"Refresh token válido por 60 minutos"},
      {k:"Inactividad",v:"Cierra sesión tras 10 min sin interacción"},
      {k:"Primer login",v:"Cognito fuerza cambio de contraseña temporal"},
    ]
  },
  github:{
    c:"#00e5ff",s:"Hosting — GitHub Pages",t:"Frontend Estático",
    d:"HTML, CSS y JS servidos como archivos estáticos desde GitHub Pages. Sin servidor propio. Se instala como PWA en iOS y Android mediante manifest.json. El SDK de Cognito se carga directamente desde CDN.",
    p:[
      {k:"Stack",v:"HTML + CSS + JS vanilla — sin frameworks ni build tools"},
      {k:"Auth SDK",v:"amazon-cognito-identity-js v6 via CDN (jsDelivr)"},
      {k:"PWA",v:"manifest.json + apple-touch-icon — instalable en móvil"},
      {k:"Deploy",v:"Push a main → auto-deploy en GitHub Pages"},
      {k:"URL",v:"https://edwardmedran.github.io/HorarioSemanal"},
      {k:"Costo",v:"$0 — gratis para repos públicos"},
    ]
  },
  cognito:{
    c:"#a855f7",s:"AWS Cognito — sa-east-1",t:"User Pool & Autenticación",
    d:"Gestiona el ciclo completo de autenticación: login con SRP (Secure Remote Password), emisión de JWT, cambio de contraseña en el primer acceso y control de sesiones. El frontend se comunica directamente con Cognito sin pasar por Lambda.",
    p:[
      {k:"Pool ID",v:"sa-east-1_eTpl9ADWH"},
      {k:"Client ID",v:"1id90v3t1hgtmfeqb8sv9sa784"},
      {k:"Login",v:"Email + contraseña (ALLOW_USER_SRP_AUTH)"},
      {k:"Registro",v:"Solo administrador — no hay autoregistro público"},
      {k:"ID Token",v:"5 minutos de validez"},
      {k:"Refresh Token",v:"60 minutos de validez"},
      {k:"Primer login",v:"FORCE_CHANGE_PASSWORD → pantalla de nueva clave"},
      {k:"Costo",v:"$0 — gratis hasta 50,000 MAU"},
    ]
  },
  lambda:{
    c:"#f97316",s:"AWS Lambda — sa-east-1",t:"API Backend",
    d:"Función Python que maneja todas las operaciones CRUD del horario. Expuesta directamente via Lambda Function URL sin API Gateway. Valida el JWT de Cognito decodificando el Bearer token manualmente y extrayendo el sub (userId) para aislar datos por usuario.",
    p:[
      {k:"Nombre",v:"horario-personal-api"},
      {k:"Runtime",v:"Python 3.12 — arm64 (Graviton, más económico)"},
      {k:"Handler",v:"lambda_function.lambda_handler"},
      {k:"Auth",v:"Bearer JWT — extrae y valida sub del payload"},
      {k:"Rutas",v:"GET /?day=X  |  PUT /  |  DELETE /?day=X"},
      {k:"Timeout",v:"10 segundos"},
      {k:"Memoria",v:"128 MB"},
      {k:"URL Auth",v:"NONE — validación manual en código Python"},
      {k:"CORS",v:"AllowOrigins: *  |  AllowMethods: *"},
      {k:"Costo",v:"$0 — gratis hasta 1M requests/mes"},
    ]
  },
  dynamo:{
    c:"#22c55e",s:"AWS DynamoDB — sa-east-1",t:"Base de Datos NoSQL",
    d:"Almacena el horario de cada usuario por día. Clave compuesta (userId + day) aísla datos entre usuarios y permite consultar un día en O(1). Los bloques se guardan como un Map preservando el orden de arrastre del usuario.",
    p:[
      {k:"Tabla",v:"horario-personal-table"},
      {k:"PK",v:"userId (String) — sub del JWT de Cognito"},
      {k:"SK",v:"day (String) — lunes | martes | … | domingo"},
      {k:"Atributos",v:"slots (Map), updatedAt (String ISO 8601)"},
      {k:"Slots",v:'{ "s1_123": { "time": "8:30 AM", "activity": "Yoga" } }'},
      {k:"Billing",v:"PAY_PER_REQUEST — sin costo fijo de capacidad"},
      {k:"Clase",v:"STANDARD"},
      {k:"Costo",v:"$0 — gratis hasta 25 GB + 25 WCU/RCU"},
    ]
  }
};

function om(id){
  const d=D[id]; if(!d) return;
  document.getElementById("mbar").style.background=d.c;
  const ms=document.getElementById("msvc"); ms.style.color=d.c; ms.textContent=d.s;
  document.getElementById("mtitle").textContent=d.t;
  document.getElementById("mdesc").textContent=d.d;
  document.getElementById("mprops").innerHTML=d.p.map(p=>`
    <div class="prop">
      <span class="pk" style="color:${d.c};opacity:.85">${p.k}</span>
      <span class="pv">${p.v}</span>
    </div>`).join("");
  document.getElementById("modal").style.borderColor=d.c+"33";
  document.getElementById("overlay").classList.add("open");
}
function cm(e){if(e.target===document.getElementById("overlay"))cd();}
function cd(){document.getElementById("overlay").classList.remove("open");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")cd();});
</script>
</body>
</html>
